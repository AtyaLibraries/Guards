name: Publish NuGet

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Optional SemVer version, for example 1.2.0 or 1.2.0-oidc.1.
        required: false
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: AtyaLibraries/github-workflows/.github/workflows/publish-nuget.yml@28a50ac6801fed1b93d193d56613ab132ae4513f
    secrets: inherit
    with:
      solution: ./Guards.sln
      test-project: ./tests/Guards.UnitTests/Guards.UnitTests.csproj
      package-project: ./src/Guards/Guards.csproj
      version: ${{ inputs.version || '1.0.1-oidc.20260619.2' }}
      require-signed: false
