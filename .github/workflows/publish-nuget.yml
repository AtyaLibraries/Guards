name: Publish NuGet

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Optional SemVer version, for example 1.2.0 or 1.2.0-oidc.1.
        required: false
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  publish:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version || '1.0.1-oidc.20260619.4' }}
        run: |
          git fetch --tags --force

          $requestedVersion = $env:REQUESTED_VERSION
          $semVerPattern = '^\d+\.\d+\.\d+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$'
          $currentTag = git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | Select-Object -First 1

          if (-not [string]::IsNullOrWhiteSpace($requestedVersion)) {
            if ($requestedVersion -notmatch $semVerPattern) {
              throw "Version must use SemVer format: MAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH-prerelease."
            }

            $version = $requestedVersion
          } elseif (-not [string]::IsNullOrWhiteSpace($currentTag)) {
            $version = $currentTag.TrimStart('v')
          } else {
            $latestTag = git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | Select-Object -First 1

            if ([string]::IsNullOrWhiteSpace($latestTag)) {
              $version = '1.0.0'
            } else {
              $match = [regex]::Match($latestTag, '^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$')

              if (-not $match.Success) {
                throw "Invalid version tag '$latestTag'. Expected vMAJOR.MINOR.PATCH."
              }

              $major = [int]$match.Groups['major'].Value
              $minor = [int]$match.Groups['minor'].Value
              $patch = [int]$match.Groups['patch'].Value + 1
              $version = "$major.$minor.$patch"
            }
          }

          $tag = "v$version"
          $existingTag = git tag --list $tag

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            $tagCommit = git rev-list -n 1 $tag
            $headCommit = git rev-parse HEAD

            if ($tagCommit -ne $headCommit) {
              throw "Tag $tag already exists on another commit."
            }

            $createTag = 'false'
          } else {
            $createTag = 'true'
          }

          $isPrerelease = $version.Contains('-').ToString().ToLowerInvariant()

          Add-Content -Path $env:GITHUB_ENV -Value "PACKAGE_VERSION=$version"
          Add-Content -Path $env:GITHUB_ENV -Value "MINVERVERSIONOVERRIDE=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "create-tag=$createTag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "prerelease=$isPrerelease"

          Write-Host "Package version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Build, pack, and SBOM
        id: build-pack
        uses: AtyaLibraries/github-workflows/.github/actions/build-pack-nuget@feat/build-pack-nuget-composite
        with:
          solution: ./Guards.sln
          package-project: ./src/Guards/Guards.csproj

      - name: Upload publish artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-packages-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.build-pack.outputs.nupkg }}
            ${{ steps.build-pack.outputs.snupkg }}
            ${{ steps.build-pack.outputs.sbom }}
          if-no-files-found: error

      - name: Login to NuGet
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ArsenAsulyan

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
          NUPKG_PATH: ${{ steps.build-pack.outputs.nupkg }}
          SNUPKG_PATH: ${{ steps.build-pack.outputs.snupkg }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NuGet trusted publishing did not return an API key."
          }

          dotnet nuget push "$env:NUPKG_PATH" `
            --api-key "$env:NUGET_API_KEY" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          dotnet nuget push "$env:SNUPKG_PATH" `
            --api-key "$env:NUGET_API_KEY" `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.build-pack.outputs.nupkg }}

      - name: Create version tag
        if: steps.version.outputs.create-tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$env:PACKAGE_VERSION"
          git push origin "v$env:PACKAGE_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.build-pack.outputs.nupkg }}
            ${{ steps.build-pack.outputs.snupkg }}
            ${{ steps.build-pack.outputs.sbom }}
