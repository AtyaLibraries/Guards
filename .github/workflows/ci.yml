name: CI

on:
  push:
    branches: [development, master]
  pull_request:
    branches: [development, master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  ci:
    uses: AtyaLibraries/github-workflows/.github/workflows/dotnet-package-ci.yml@8b4d3932f62b03a9e191dca852282b3ce8a4f826 # v1
    with:
      solution: ./Guards.sln
      test-project: ./tests/Guards.UnitTests/Guards.UnitTests.csproj
      package-project: ./src/Guards/Guards.csproj
      allow-empty-coverage: true # scaffold has no covered code yet; set false once you add some
